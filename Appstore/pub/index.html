<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- 1. SET THE BASE HREF: This handles most relative links -->
    <base href="/Appstore/">

    <script>
        // 2. THE MASTER INTERCEPTOR: Aliases "/" to "/Appstore/" globally
        (function () {
            const isGitHub = window.location.hostname.includes('github.io');
            const repoPath = '/Appstore'; // No trailing slash here

            if (isGitHub) {
                // Fix for RequireJS (Uno's loader)
                window.require = { baseUrl: '/Appstore/' };

                // Fix for Dynamic Script Tags (Stops 404s on AppManifest.js, Uno.Wasm.js, etc.)
                const orgCreate = document.createElement;
                document.createElement = function (tag) {
                    const el = orgCreate.call(document, tag);
                    if (tag.toLowerCase() === 'script') {
                        const descriptor = Object.getOwnPropertyDescriptor(HTMLScriptElement.prototype, 'src');
                        Object.defineProperty(el, 'src', {
                            set: function (val) {
                                if (val.startsWith('/') && !val.startsWith(repoPath)) {
                                    val = repoPath + val;
                                }
                                descriptor.set.call(this, val);
                            },
                            get: function () { return descriptor.get.call(this); }
                        });
                    }
                    return el;
                };

                // Fix for Fetch (Stops 404s on .wasm and .dotnet binary files)
                const orgFetch = window.fetch;
                window.fetch = function (url, options) {
                    if (typeof url === 'string' && url.startsWith('/') && !url.startsWith(repoPath)) {
                        url = repoPath + url;
                    }
                    return orgFetch(url, options);
                };
            }
        })();
    </script>

    <!-- 3. RELATIVE LINKS: Ensure no leading "/" so they respect <base href> -->
    <script type="text/javascript" src="package_b6e2251ab3acc78e850f6f5fc2261afa3bff6ab7/require.js"></script>
    <script type="module" src="package_b6e2251ab3acc78e850f6f5fc2261afa3bff6ab7/uno-bootstrap.js"></script>

    <link rel="stylesheet" type="text/css" href="package_b6e2251ab3acc78e850f6f5fc2261afa3bff6ab7/normalize.css" />
    <link rel="stylesheet" type="text/css" href="package_b6e2251ab3acc78e850f6f5fc2261afa3bff6ab7/uno-bootstrap.css" />
    <link rel="stylesheet" type="text/css" href="package_b6e2251ab3acc78e850f6f5fc2261afa3bff6ab7/Uno.UI.css" />
    <link rel="stylesheet" type="text/css" href="package_b6e2251ab3acc78e850f6f5fc2261afa3bff6ab7/Fonts.css" />

    <!-- Fix static asset links -->
    <link rel="manifest" href="manifest.webmanifest" />

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff" />
</head>
<body>
    <div id="uno-body" class="container-fluid uno-body">
        <div class="uno-loader" loading-position="bottom" loading-alert="none">
            <!-- Loading Screen Content -->
            <progress></progress>
            <span class="alert"></span>
        </div>
    </div>
    <noscript>
        <p>This application requires Javascript and WebAssembly to be enabled.</p>
    </noscript>
</body>
</html>
