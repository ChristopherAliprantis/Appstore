<!DOCTYPE html>
<html>
<head>
    <base href="/Appstore/">
    <script>
        (function () {
            const isGitHub = window.location.hostname.includes('github.io');
            const prefix = isGitHub ? '/Appstore' : '';
            const currentBase = isGitHub ? '/Appstore/' : '/';

            // 1. Fix RequireJS (Uno's main loader)
            window.require = { baseUrl: currentBase };

            // 2. Fix Dynamic Script Tags (Catch-all for internal Uno injections)
            const originalCreateElement = document.createElement;
            document.createElement = function (tagName) {
                const element = originalCreateElement.call(document, tagName);
                if (tagName.toLowerCase() === 'script') {
                    const originalSetAttribute = element.setAttribute;
                    element.setAttribute = function (name, value) {
                        if (name === 'src' && value.startsWith('/') && !value.startsWith(currentBase)) {
                            value = prefix + value;
                        }
                        originalSetAttribute.call(element, name, value);
                    };
                    // Also intercept direct .src property access
                    Object.defineProperty(element, 'src', {
                        set: function (value) {
                            if (value.startsWith('/') && !value.startsWith(currentBase)) {
                                value = prefix + value;
                            }
                            element.setAttribute('src', value);
                        },
                        get: function () { return element.getAttribute('src'); }
                    });
                }
                return element;
            };

            // 3. Fix Fetch & XHR (For API calls and internal data loads)
            const originalFetch = window.fetch;
            window.fetch = (input, init) => {
                if (typeof input === 'string' && input.startsWith('/') && !input.startsWith(currentBase)) {
                    input = currentBase + input.substring(1);
                }
                return originalFetch(input, init);
            };

            const originalOpen = XMLHttpRequest.prototype.open;
            XMLHttpRequest.prototype.open = function (method, url) {
                if (typeof url === 'string' && url.startsWith('/') && !url.startsWith(currentBase)) {
                    url = currentBase + url.substring(1);
                }
                return originalOpen.apply(this, arguments);
            };
        })();
    </script>

    <!-- Keep your relative script loads exactly as they are -->
    <script type="text/javascript" src="package_b6e2251ab3acc78e850f6f5fc2261afa3bff6ab7/require.js"></script>
    <script type="module" src="package_b6e2251ab3acc78e850f6f5fc2261afa3bff6ab7/uno-bootstrap.js"></script>
</head>
